<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>magicNotes</title>
    <link id="favicon-ico" rel="icon" href="./assets/brand/favicon-clipboard.ico" sizes="any">
    <link id="favicon-svg" rel="icon" href="./assets/brand/icon-clipboard.svg" type="image/svg+xml">
    <link id="apple-touch-icon" rel="apple-touch-icon" href="./assets/brand/apple-touch-clipboard.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Comic+Neue:wght@400;700&family=Courier+Prime&family=Fredericka+the+Great&family=IBM+Plex+Mono:wght@400;500&family=Indie+Flower&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&family=Kalam:wght@400;700&family=Libre+Baskerville&family=Merriweather:wght@400;700&family=Orbitron:wght@500;700&family=Overpass+Mono:wght@400;500&family=Patrick+Hand&family=Permanent+Marker&family=Press+Start+2P&family=Sacramento&family=Shadows+Into+Light&family=Share+Tech+Mono&family=Special+Elite&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/base.css?v=dev_1.9.0">
    <link rel="stylesheet" href="./css/shell-core.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/shell-filecabinet.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/shell-sidebar.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/shell-display-options.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/shell-editor.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/sidebar.css?v=dev_1.9.0">
    <link rel="stylesheet" href="./css/cards.css?v=dev_1.9.0">
    <link rel="stylesheet" href="./css/overlays.css?v=dev_1.9.0">
    <link rel="stylesheet" href="./css/board.css?v=dev_1.9.0">
    <link rel="stylesheet" href="./css/themes.css?v=dev_1.9.0">
    <link rel="stylesheet" href="./css/drawing.css?v=dev_1.9.0">
    <link rel="stylesheet" href="./css/tools.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/calendar.css?v=dev_1.1.0">
    <link rel="stylesheet" href="./css/cosmos.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/sidebar-media.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/radio.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/tv.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/weather.css?v=dev_1.0.0">
    <link rel="stylesheet" href="./css/sheet.css?v=dev_1.0.0">
    <style>
        #app-boot {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #121214;
        }
    </style>
</head>
<body aria-busy="true">

    <div id="app-boot" class="app-boot is-indeterminate" role="progressbar"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
         aria-label="Loading application">
        <div class="app-boot__panel">
            <div class="app-boot__brand">magicNotes</div>
            <div class="app-boot__track"><div id="app-boot-bar" class="app-boot__bar"></div></div>
            <p id="app-boot-status" class="app-boot__status">Loading workspace…</p>
        </div>
    </div>

    <div id="workspace-shell" class="workspace-shell">
        <button type="button" id="nav-panel-toggle-fab" class="side-panel-toggle-fab is-hidden" title="Show panel" aria-label="Show side panel">
            <img class="app-brand__icon" src="./assets/brand/icon-clipboard.svg" alt="" width="16" height="16" decoding="async">
        </button>

        <aside id="side-panel" class="side-panel" aria-label="Side panel">
            <div id="side-panel-brand-host" class="side-panel-brand-host is-visible">
                <div class="control-bar-brand is-in-sidebar">
                    <button type="button" id="nav-panel-toggle" class="side-panel-toggle-btn" title="Hide panel" aria-label="Hide side panel" aria-expanded="true">
                        <img class="app-brand__icon" src="./assets/brand/icon-clipboard.svg" alt="" width="16" height="16" decoding="async">
                    </button>
                    <div id="app-brand" class="app-brand">
                        <span class="app-brand__text">magicNotes</span>
                    </div>
                </div>
            </div>

            <div class="side-panel-chrome side-panel-search">
                <div id="side-panel-search" class="side-panel-search-wrap">
                    <button type="button" id="side-panel-search-toggle" class="btn btn--compact btn-icon side-panel-search-toggle is-hidden" title="Search notes" aria-label="Search notes" aria-expanded="false" aria-controls="workspace-search-input">⌕</button>
                    <div class="side-panel-search-field">
                        <input type="search" id="workspace-search-input" class="side-panel-search-input form-input" placeholder="Search…" aria-label="Search notes" autocomplete="off" spellcheck="false" aria-expanded="false" aria-controls="workspace-search-panel">
                        <button type="button" id="workspace-search-clear" class="side-panel-search-clear" title="Clear search" aria-label="Clear search">×</button>
                    </div>
                    <div id="workspace-search-panel" class="search-results-panel is-hidden" role="listbox" aria-label="Search results"></div>
                </div>
            </div>

            <div class="side-panel-modules">
            <div id="sidebar-clock" class="sidebar-module sidebar-clock side-panel-clock">
                <div class="collapsable-header" id="clock-section-header">
                    <span class="collapsable-heading"><span class="collapsable-toggle"><svg viewBox="0 0 12 12" width="9" height="9" focusable="false"><path d="M3.2 4.8 6 7.6 8.8 4.8" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Clock</span>
                    <button type="button" class="card-act sidebar-module__dock" data-sidebar-dock title="Undock to canvas" aria-label="Undock to canvas"></button>
                </div>
                <div class="collapsable-section" id="clock-section">
                    <div id="digital-clock" class="logo-zone logo-zone--clock logo-zone--sidebar">
                        <button type="button" id="clock-display" class="clock-display clock-display-trigger" title="Change clock style" aria-label="Clock and date — change style" aria-expanded="false" aria-haspopup="menu">
                            <span id="clock-date" class="clock-chip clock-chip--date">—</span>
                            <span id="clock-time" class="clock-chip clock-chip--time">—</span>
                            <div id="clock-analog" class="clock-analog">
                                <div class="clock-departure">
                                    <div class="clock-departure-face"></div>
                                    <span id="clock-analog-date" class="clock-departure-date"></span>
                                </div>
                            </div>
                            <div id="clock-segment" class="clock-segment">
                                <div class="clock-segment-board">
                                    <div id="clock-segment-time" class="clock-segment-time" role="timer" aria-live="off"></div>
                                </div>
                            </div>
                            <div id="clock-mantel" class="clock-mantel">
                                <div class="clock-mantel-frame">
                                    <div class="clock-mantel-face">
                                        <span id="clock-mantel-date" class="clock-mantel-date"></span>
                                        <span id="clock-mantel-time" class="clock-mantel-time"></span>
                                    </div>
                                </div>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <div id="sidebar-quick-actions" class="sidebar-module sidebar-quick-actions">
                <div class="collapsable-header" id="quick-actions-header">
                    <span class="collapsable-heading"><span class="collapsable-toggle collapsed"><svg viewBox="0 0 12 12" width="9" height="9" focusable="false"><path d="M3.2 4.8 6 7.6 8.8 4.8" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Actions</span>
                    <span class="quick-actions-header-icons">
                        <button type="button" class="btn btn--compact btn--icon quick-act-header-btn" id="qa-header-freeform-toggle" title="Toggle view mode" aria-label="Toggle view mode" aria-pressed="false"></button>
                        <button type="button" class="btn btn--compact btn--icon quick-act-header-btn" id="qa-header-file-cabinet-toggle" title="File Cabinet" aria-label="File Cabinet" aria-pressed="false"></button>
                        <button type="button" class="btn btn--compact btn--icon quick-act-header-btn" id="qa-header-undo" disabled title="Undo (Ctrl+Z)" aria-label="Undo"></button>
                        <button type="button" class="btn btn--compact btn--icon quick-act-header-btn" id="qa-header-redo" disabled title="Redo (Ctrl+Y)" aria-label="Redo"></button>
                    </span>
                    <button type="button" class="card-act sidebar-module__dock" data-sidebar-dock title="Undock to canvas" aria-label="Undock to canvas"></button>
                </div>
                <div class="collapsable-section collapsed" id="quick-actions-section">
                    <div id="quick-actions-zone" class="quick-actions-grid"></div>
                </div>
            </div>

            <div id="sidebar-radio" class="sidebar-module sidebar-radio" aria-label="Internet radio"></div>

            <div id="sidebar-tv" class="sidebar-module sidebar-tv" aria-label="World TV"></div>

            <div id="sidebar-weather" class="sidebar-module sidebar-weather" aria-label="Weather"></div>

            <div id="sidebar-categories" class="sidebar-module sidebar-categories">
                <div class="collapsable-header sidebar-panel-list-header" id="categories-section-header">
                    <span class="collapsable-heading"><span class="collapsable-toggle collapsed"><svg viewBox="0 0 12 12" width="9" height="9" focusable="false"><path d="M3.2 4.8 6 7.6 8.8 4.8" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Categories</span>
                    <button type="button" class="card-act sidebar-module__dock" data-sidebar-dock title="Undock to canvas" aria-label="Undock to canvas"></button>
                </div>
                <div class="collapsable-section collapsed" id="categories-section">
                    <div class="sidebar-notes-group">
                        <div class="collapsable-header list-row--header sidebar-notes-subheader" id="categories-list-active-header">
                            <span class="collapsable-heading"><span class="collapsable-toggle collapsed">▼</span>Active</span>
                            <span id="categories-active-count" class="status-badge">0</span>
                        </div>
                        <div class="collapsable-section collapsed" id="categories-list-active-section">
                            <div id="categories-list-active-zone" class="sidebar-notes-list"></div>
                        </div>
                    </div>
                    <div class="sidebar-notes-group">
                        <div class="collapsable-header list-row--header sidebar-notes-subheader" id="categories-list-hidden-header">
                            <span class="collapsable-heading"><span class="collapsable-toggle collapsed">▼</span>Hidden</span>
                            <span id="categories-hidden-count" class="status-badge">0</span>
                        </div>
                        <div class="collapsable-section collapsed" id="categories-list-hidden-section">
                            <div id="categories-list-hidden-zone" class="sidebar-notes-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sidebar-tools" class="sidebar-module sidebar-tools">
                <div class="collapsable-header" id="tools-section-header">
                    <span class="collapsable-heading"><span class="collapsable-toggle collapsed"><svg viewBox="0 0 12 12" width="9" height="9" focusable="false"><path d="M3.2 4.8 6 7.6 8.8 4.8" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Tools</span>
                    <button type="button" class="card-act sidebar-module__dock" data-sidebar-dock title="Undock to canvas" aria-label="Undock to canvas"></button>
                </div>
                <div class="collapsable-section collapsed" id="tools-section">
                    <div id="toolbox-dropdown" class="quick-actions-grid"></div>
                </div>
            </div>

            <div id="sidebar-notes-list" class="sidebar-module sidebar-notes-list">
                <div class="collapsable-header sidebar-notes-list-header" id="notes-list-section-header">
                    <span class="collapsable-heading"><span class="collapsable-toggle"><svg viewBox="0 0 12 12" width="9" height="9" focusable="false"><path d="M3.2 4.8 6 7.6 8.8 4.8" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round"/></svg></span>List</span>
                    <button type="button" class="card-act sidebar-module__dock" data-sidebar-dock title="Undock to canvas" aria-label="Undock to canvas"></button>
                </div>
                <div class="collapsable-section" id="notes-list-section">
                    <div class="sidebar-notes-group">
                        <div class="collapsable-header list-row--header sidebar-notes-subheader" id="notes-list-active-header">
                            <span class="collapsable-heading"><span class="collapsable-toggle">▼</span>Active</span>
                            <span class="sidebar-notes-list-sort" id="notes-list-sort-tools">
                                <button type="button" class="sidebar-sort-btn" id="notes-sort-title" title="Sort by title" aria-label="Sort by title"></button>
                                <button type="button" class="sidebar-sort-btn" id="notes-sort-date" title="Sort by date" aria-label="Sort by date"></button>
                            </span>
                            <span id="notes-active-count" class="status-badge">0</span>
                        </div>
                        <div class="collapsable-section" id="notes-list-active-section">
                            <div id="notes-list-active-zone" class="sidebar-notes-list"></div>
                        </div>
                    </div>
                    <div class="sidebar-notes-group">
                        <div class="collapsable-header list-row--header sidebar-notes-subheader" id="notes-list-hidden-header">
                            <span class="collapsable-heading"><span class="collapsable-toggle collapsed">▼</span>Hidden</span>
                            <span id="notes-hidden-count" class="status-badge">0</span>
                        </div>
                        <div class="collapsable-section collapsed" id="notes-list-hidden-section">
                            <div id="notes-list-hidden-zone" class="sidebar-notes-list"></div>
                        </div>
                    </div>
                    <div class="sidebar-notes-group">
                        <div class="collapsable-header list-row--header sidebar-notes-subheader" id="notes-list-archived-header">
                            <span class="collapsable-heading"><span class="collapsable-toggle collapsed">▼</span>Archived</span>
                            <span id="notes-archived-count" class="status-badge">0</span>
                        </div>
                        <div class="collapsable-section collapsed" id="notes-list-archived-section">
                            <div id="notes-list-archived-zone" class="sidebar-notes-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sidebar-history-section" class="sidebar-module sidebar-history-section is-hidden">
                <div class="collapsable-header sidebar-history-header" id="history-section-header">
                    <span class="collapsable-heading"><span class="collapsable-toggle collapsed"><svg viewBox="0 0 12 12" width="9" height="9" focusable="false"><path d="M3.2 4.8 6 7.6 8.8 4.8" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round"/></svg></span>History</span>
                    <span id="history-count-badge" class="status-badge">0</span>
                    <button type="button" class="card-act sidebar-module__dock" data-sidebar-dock title="Undock to canvas" aria-label="Undock to canvas"></button>
                </div>
                <div class="collapsable-section collapsed" id="history-section">
                    <div id="sidebar-history-undo-list" class="sidebar-history-list"></div>
                    <div id="sidebar-history-redo-list" class="sidebar-history-list sidebar-history-list--redo is-hidden"></div>
                </div>
            </div>
            <div id="sidebar-stats-section" class="sidebar-module sidebar-stats-section">
                <div class="collapsable-header" id="stats-section-header">
                    <span class="collapsable-heading"><span class="collapsable-toggle collapsed"><svg viewBox="0 0 12 12" width="9" height="9" focusable="false"><path d="M3.2 4.8 6 7.6 8.8 4.8" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Stats</span>
                    <button type="button" class="card-act sidebar-module__dock" data-sidebar-dock title="Undock to canvas" aria-label="Undock to canvas"></button>
                </div>
                <div class="collapsable-section collapsed" id="stats-section">
                    <div id="sidebar-storage-stats" class="sidebar-storage-stats" aria-label="Workspace stats"></div>
                </div>
            </div>
            </div>

            <input type="file" id="system-import-file-picker" accept=".json" class="is-hidden">
        </aside>
        <script>
            (function () {
                try {
                    var stored = localStorage.getItem('matrix_panel_collapsed');
                    var collapsed = stored === null ? true : stored === 'true';
                    var panel = document.getElementById('side-panel');
                    var fab = document.getElementById('nav-panel-toggle-fab');
                    var toggle = document.getElementById('nav-panel-toggle');
                    if (panel) panel.classList.toggle('is-collapsed', collapsed);
                    if (fab) fab.classList.toggle('is-hidden', !collapsed);
                    if (toggle) {
                        toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
                        toggle.setAttribute('title', collapsed ? 'Show panel' : 'Hide panel');
                        toggle.setAttribute('aria-label', collapsed ? 'Show side panel' : 'Hide side panel');
                    }

                    var sectionsRaw = localStorage.getItem('matrix_sidebar_sections');
                    if (!sectionsRaw) return;
                    var sections = JSON.parse(sectionsRaw);
                    Object.keys(sections).forEach(function (sectionId) {
                        if (!sections[sectionId]) return;
                        var section = document.getElementById(sectionId);
                        if (!section) return;
                        section.classList.add('collapsed');
                        var header = section.previousElementSibling;
                        if (header && header.classList.contains('collapsable-header')) {
                            var toggleEl = header.querySelector('.collapsable-toggle');
                            if (toggleEl) toggleEl.classList.add('collapsed');
                        }
                    });
                } catch (e) { /* ignore */ }
            })();
        </script>

        <div id="workspace-main" class="workspace-main">
            <div id="desktop-surface" class="desktop-surface">
                <main id="app-canvas">
                    <div class="system-status-msg">Loading workspace…</div>
                </main>
                <div id="drawing-board" class="drawing-board is-hidden" aria-hidden="true">
                    <div id="canvas-viewport" class="canvas-viewport">
                        <div id="canvas-viewport-inner" class="canvas-viewport-inner">
                            <canvas id="drawing-bg-canvas" class="drawing-bg-canvas"></canvas>
                            <canvas id="drawing-canvas" class="drawing-canvas"></canvas>
                            <div id="canvas-text-layer" class="canvas-text-layer"></div>
                        </div>
                    </div>
                    <div id="drawing-toolbar-panel" class="drawing-toolbar-panel is-hidden" aria-label="Drawing tools">
                        <div class="drawing-toolbar-panel__header" data-draw-toolbar-drag>
                            <span class="drawing-toolbar-panel__grip" aria-hidden="true">⋮⋮</span>
                            <span class="drawing-toolbar-panel__title">magicCanvas</span>
                            <span class="drawing-toolbar-panel__spacer"></span>
                            <button type="button" class="card-act drawing-toolbar-panel__collapse" id="draw-panel-collapse" title="Minimize toolbar" aria-label="Minimize toolbar"></button>
                        </div>
                        <div id="drawing-control-actions" class="drawing-toolbar-panel__body control-bar-actions-group" aria-label="Drawing tools"></div>
                    </div>
                    <div id="drawing-toolbar-chip" class="drawing-toolbar-chip is-hidden" aria-label="Drawing tools minimized">
                        <button type="button" class="drawing-toolbar-chip__drag" data-draw-chip-drag title="Drag toolbar" aria-label="Drag toolbar">
                            <span class="drawing-toolbar-chip__icon" aria-hidden="true">✎</span>
                        </button>
                        <button type="button" class="card-act drawing-toolbar-chip__expand" id="draw-panel-expand" title="Expand toolbar" aria-label="Expand toolbar"></button>
                    </div>
                </div>
                <div id="tools-desktop" class="tools-desktop" aria-live="polite"></div>
            </div>
        </div>
    </div>

    <button type="button" id="fab-create" class="fab-create is-hidden" title="New note" aria-label="New note">+</button>

    <div id="template-picker-overlay" class="overlay template-picker-overlay is-hidden" role="dialog" aria-modal="true" aria-label="Choose note template">
        <div class="template-picker">
            <h2 class="template-picker__title">New note</h2>
            <div class="template-picker__tiles">
                <button type="button" class="template-picker__tile" data-template="default">
                    <div class="template-picker__wireframe template-picker__wireframe--note" aria-hidden="true">
                        <span></span><span></span><span></span>
                    </div>
                    <span class="template-picker__label">Note / Checklist</span>
                    <span class="template-picker__desc">Text and checklist items</span>
                </button>
                <button type="button" class="template-picker__tile" data-template="sheet">
                    <div class="template-picker__wireframe template-picker__wireframe--sheet" aria-hidden="true">
                        <span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <span class="template-picker__label">Sheet</span>
                    <span class="template-picker__desc">Lightweight grid</span>
                </button>
                <button type="button" class="template-picker__tile" data-template="meeting">
                    <div class="template-picker__wireframe template-picker__wireframe--meeting" aria-hidden="true">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <span class="template-picker__label">Meeting</span>
                    <span class="template-picker__desc">Attendees, agenda, actions</span>
                </button>
            </div>
        </div>
    </div>

    <div id="editor-overlay" class="overlay is-hidden">
        <div class="modal">
            <div class="toolbar editor-toolbar">
                <div id="modal-toolbar-mount" class="modal-toolbar-mount"></div>
                <input type="hidden" id="edit-bg-color-value" value="">
            </div>
            <div id="modal-form-mount" class="modal-body"></div>
            <button type="button" id="modal-approve-btn" class="fab-create editor-fab" title="Show on board" aria-label="Show on board"></button>
        </div>
    </div>

    <script type="module" src="./js/app.js?v=dev_1.7.9"></script>
</body>
</html>
